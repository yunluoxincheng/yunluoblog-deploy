services:
  db:
    image: postgres:16-alpine
    container_name: yunluoblog-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./yunluoblog-server
    container_name: yunluoblog-server
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN}
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${SERVER_PORT}:8080"

  web:
    build:
      context: ./yunluoblog-web
      args:
        API_SERVER_URL: http://server:8080
    container_name: yunluoblog-web
    environment:
      API_SERVER_URL: http://server:8080
    command:
      [
        "sh",
        "-c",
        "pnpm run build && echo 'Build completed successfully' > /app/dist/.build-done",
      ]
    volumes:
      - ./yunluoblog-web/dist:/app/dist
    depends_on:
      server:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: yunluoblog-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./yunluoblog-web/dist:/usr/share/nginx/html:ro
      - ./uploads:/app/uploads:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web:
        condition: service_completed_successfully
      server:
        condition: service_healthy

volumes:
  pgdata:
